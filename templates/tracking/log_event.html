{% extends "base.html" %}
{% block title %}Log Event — CargoTrack{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card p-4">
      <h5 class="fw-bold mb-4" style="color:var(--ct-navy)">
        <i class="fas fa-map-marker-alt me-2" style="color:var(--ct-orange)"></i>Log Tracking Event
      </h5>
      <form method="post">
        {% csrf_token %}
        <div class="row g-3">
          {% for field in form %}
          <div class="col-12">
            <label class="form-label fw-semibold">{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}<div class="text-danger small">{{ field.errors.0 }}</div>{% endif %}
          </div>
          {% endfor %}
        </div>
        <div class="mt-4 d-flex gap-2">
          <button type="submit" class="btn text-white" style="background:var(--ct-orange)">
            <i class="fas fa-save me-1"></i>Log Event
          </button>
          <a href="javascript:history.back()" class="btn btn-outline-secondary">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
