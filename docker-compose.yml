services:

  # ── Coturn TURN/STUN server ────────────────────────────────────────────────────
  # Relays WebRTC media between peers behind NAT for video calls.
  # Exposes STUN on 3478 (UDP/TCP) and TURN on the same port with ephemeral
  # HMAC-SHA1 credentials generated by the backend (/api/v1/chat/webrtc-config/).
  # In production, also expose TLS on 5349 with a real certificate.
  coturn:
    image: coturn/coturn:4.6-alpine
    volumes:
      - ./coturn/turnserver.conf:/etc/coturn/turnserver.conf:ro
    network_mode: host
    # network_mode: host is the simplest config for STUN/TURN which needs
    # the real client-facing IP, not a Docker bridge address.  In production,
    # run coturn directly on the host or use host mode with docker-compose.
    # If host networking is not available, remove network_mode and expose ports:
    # ports:
    #   - "3478:3478/udp"
    #   - "3478:3478/tcp"
    #   - "5349:5349/tcp"

  # ── pgBouncer (connection pooler) ───────────────────────────────────────────────
  # Sits between Django and PostgreSQL, multiplexing application connections
  # over a smaller number of persistent database connections.  Essential for
  # production deployments where many Daphne/Gunicorn workers share the DB.
  # To enable: set DB_HOST=pgtower and DB_PORT=6432 in .env.
  pgbouncer:
    image: edoburu/pgbouncer:latest
    environment:
      DB_HOST: db
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set in .env}
      DB_NAME: ${DB_NAME:-cargotrack}
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 100
      DEFAULT_POOL_SIZE: 20
    ports:
      - "6432:6432"
    depends_on:
      db:
        condition: service_healthy

  # ── Redis 7 ─────────────────────────────────────────────────────────────────────
  # Pub/sub channel layer for Django Channels WebSocket communication.
  # Required for real-time features: notifications, chat, tracking, video signaling.
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── PostgreSQL 16 + TimescaleDB 2.16 ─────────────────────────────────────────
  # TimescaleDB is a time-series extension for PostgreSQL that automatically
  # partitions the tracking_events table by time (hypertable) and compresses
  # old chunks.  The timescaledb image is a drop-in replacement for upstream
  # Postgres with the extension preloaded in shared_preload_libraries.
  db:
    image: timescale/timescaledb:2.16-pg16
    environment:
      # Database name created on first startup; matches Django DB_NAME setting.
      POSTGRES_DB:       ${DB_NAME:-cargotrack}
      # Superuser account Django connects with; matches Django DB_USER setting.
      POSTGRES_USER:     ${DB_USER:-postgres}
      # Must be provided in .env — the :? syntax causes compose to fail fast
      # with a clear error if DB_PASSWORD is missing or empty.
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set in .env}
    volumes:
      # Named volume persists Postgres data across container restarts and
      # `docker compose down` calls.  Only `docker compose down -v` removes it.
      - postgres_data:/var/lib/postgresql/data
    ports:
      # Expose Postgres on the host for database GUI tools (e.g. pgAdmin, DBeaver).
      # Remove this mapping in production to prevent external access.
      - "5432:5432"
    healthcheck:
      # pg_isready exits 0 only when Postgres accepts connections.
      # The backend service depends_on this check so Django never starts
      # before the database is ready to accept connections.
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-cargotrack}"]
      interval: 5s   # check every 5 seconds
      timeout: 5s    # fail check after 5 seconds of no response
      retries: 10    # mark unhealthy after 10 consecutive failures

  # ── Django backend ─────────────────────────────────────────────────────────────
  # Runs Django via Gunicorn (production) or `runserver` (development, current CMD).
  # The entrypoint applies migrations before starting the server so the schema is
  # always up-to-date when the container first becomes reachable.
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      DB_HOST: db
      REDIS_URL: redis://redis:6379/0
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    command: >
      sh -c "python manage.py migrate &&
             daphne -b 0.0.0.0 -p 8000 cargotrack.asgi:application"

  # ── Elixir/Phoenix WebSocket service ──────────────────────────────────────────
  # Drop-in replacement for Django Channels' Daphne ASGI server for real-time
  # features: notifications, chat, video signalling.  Validates JWT tokens with
  # the same HS256 secret as the Django backend.  Connects to Redis for PubSub
  # bridging between Phoenix channels and Django's Redis Channel Layer.
  elixir-ws:
    build:
      context: ./elixir-ws
      dockerfile: Dockerfile
    depends_on:
      redis:
        condition: service_healthy
    environment:
      WS_PORT: "4000"
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY_BASE: ${JWT_SECRET_KEY:-django-insecure-dev-key}
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
    ports:
      - "4000:4000"

  # ── Go tracking ingestion service ─────────────────────────────────────────────
  # High-throughput tracking event ingestion (POST /events, flushes batches to
  # PostgreSQL via COPY protocol).  Route /api/v1/tracking/events/ traffic here
  # for 10x+ throughput over Django for the write path.
  go-tracking:
    build:
      context: ./go-tracking
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      TRACKING_DB_URL: postgres://${DB_USER:-postgres}:${DB_PASSWORD}@db:5432/${DB_NAME:-cargotrack}?sslmode=disable
      TRACKING_PORT: "8080"
    ports:
      - "8080:8080"

  # ── React / Vite frontend ──────────────────────────────────────────────────────
  # Runs the Vite dev server with hot module replacement.  In production,
  # run `npm run build` and serve the dist/ directory from Nginx or a CDN.
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    depends_on:
      # Wait for the backend to be up before starting Vite so the proxy target
      # is ready immediately on first request.
      - backend
    environment:
      # Vite server-side proxy target — used by vite.config.ts to forward
      # /api/* requests from the browser to Django.  Must use the Docker
      # service name ('backend'), not 'localhost'.
      # Note: browser requests use relative /api/... paths; no VITE_API_URL
      # is needed because baseURL defaults to '' in frontend/src/api/client.ts.
      API_PROXY_TARGET: http://backend:8000
    volumes:
      # Bind-mount frontend source for HMR (changes reflected without rebuild).
      - ./frontend:/app/frontend
      # Preserve the node_modules directory installed during `docker build`
      # so the host bind-mount above doesn't shadow it with an empty directory.
      - /app/frontend/node_modules
      # Mount shared/ at /app/shared/ so tsc can resolve the @shared/* path
      # alias (../shared/* relative to /app/frontend/) during dev and build.
      - ./shared:/app/shared
    ports:
      # Vite dev server port; open http://localhost:5173 in the browser.
      - "5173:5173"

volumes:
  postgres_data:
  redis_data:
