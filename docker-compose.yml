services:

  # ── Coturn TURN/STUN server ────────────────────────────────────────────────────
  coturn:
    image: coturn/coturn:4.6-alpine
    volumes:
      - ./coturn/turnserver.conf:/etc/coturn/turnserver.conf:ro
    network_mode: host

  # ── pgBouncer (connection pooler) ───────────────────────────────────────────────
  pgbouncer:
    image: edoburu/pgbouncer:latest
    environment:
      DB_HOST: db
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set in .env}
      DB_NAME: ${DB_NAME:-cargotrack}
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 100
      DEFAULT_POOL_SIZE: 20
    ports:
      - "6432:6432"
    depends_on:
      db:
        condition: service_healthy

  # ── Redis 7 ─────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Apache Kafka (KRaft mode) + Schema Registry ─────────────────────────────
  # Replaces Redis Streams as the primary event bus.  Uses KRaft (no Zookeeper
  # required) and Confluent Schema Registry for Protobuf schema enforcement.
  kafka:
    image: confluentinc/confluent-local:7.8.0
    hostname: kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENERS: PLAINTEXT://kafka:29092,CONTROLLER://kafka:29093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_LOG_RETENTION_HOURS: 168
      CLUSTER_ID: cargotrack-cluster-001
    ports:
      - "9092:9092"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "bash", "-c", "kafka-topics --bootstrap-server localhost:9092 --list 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5

  schema-registry:
    image: confluentinc/cp-schema-registry:7.8.0
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: PLAINTEXT://kafka:29092
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
    ports:
      - "8081:8081"

  # Kafka UI for development/admin (http://localhost:8088)
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    depends_on:
      - kafka
      - schema-registry
    environment:
      KAFKA_CLUSTERS_0_NAME: cargotrack
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_SCHEMAREGISTRY: http://schema-registry:8081
    ports:
      - "8088:8080"

  # ── PostgreSQL 16 + TimescaleDB 2.16 ─────────────────────────────────────────
  db:
    image: timescale/timescaledb:2.16-pg16
    environment:
      POSTGRES_DB:       ${DB_NAME:-cargotrack}
      POSTGRES_USER:     ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-cargotrack}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Django backend ─────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: services/api/.env
    environment:
      DB_HOST: db
      REDIS_URL: redis://redis:6379/0
      OIDC_ENABLED: "${OIDC_ENABLED:-true}"
      KEYCLOAK_SERVER_URL: "${KEYCLOAK_SERVER_URL:-http://keycloak:8080}"
      KEYCLOAK_REALM: "${KEYCLOAK_REALM:-cargotrack}"
      KEYCLOAK_CLIENT_ID: "${KEYCLOAK_CLIENT_ID:-cargotrack-api}"
    volumes:
      - ./services/api:/app
    ports:
      - "8000:8000"
    command: >
      sh -c "python manage.py migrate &&
             daphne -b 0.0.0.0 -p 8000 cargotrack.asgi:application"

  # ── Elixir/Phoenix WebSocket service ──────────────────────────────────────────
  elixir-ws:
    build:
      context: ./services/ws
      dockerfile: Dockerfile
    depends_on:
      redis:
        condition: service_healthy
    environment:
      WS_PORT: "4000"
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY_BASE: ${JWT_SECRET_KEY:-django-insecure-dev-key}
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
    ports:
      - "4000:4000"

  # ── Go tracking ingestion service ─────────────────────────────────────────────
  go-tracking:
    build:
      context: ./services/tracking-ingest
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      TRACKING_DB_URL: postgres://${DB_USER:-postgres}:${DB_PASSWORD}@db:5432/${DB_NAME:-cargotrack}?sslmode=disable
      TRACKING_PORT: "8080"
    ports:
      - "8080:8080"

  # ── EMQX MQTT Broker (IoT device connectivity) ──────────────────────────────
  emqx:
    image: emqx/emqx:5.7-alpine
    environment:
      EMQX_NAME: cargotrack-mqtt
      EMQX_HOST: emqx
    ports:
      - "1883:1883"       # MQTT
      - "8083:8083"       # WebSocket
      - "18083:18083"     # Dashboard
    volumes:
      - emqx_data:/opt/emqx/data
    healthcheck:
      test: ["CMD", "/opt/emqx/bin/emqx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Rust GPS Telematics Ingestion (MQTT → Kafka) ──────────────────────────
  gps-ingest:
    build:
      context: ./services/gps-ingest
      dockerfile: Dockerfile
    depends_on:
      emqx:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      MQTT_HOST: emqx
      MQTT_PORT: "1883"
      MQTT_TOPIC: cargotrack/gps/+/raw
      KAFKA_BROKERS: kafka:29092
      KAFKA_TOPIC_POSITIONS: cargotrack.gps.positions
      KAFKA_TOPIC_GEOFENCE: cargotrack.gps.geofence

  # ── Go Notification Dispatch Service ───────────────────────────────────────
  notification:
    build:
      context: ./services/notification
      dockerfile: Dockerfile
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BROKERS: kafka:29092
      KAFKA_TOPICS: cargotrack.alerts.triggered,cargotrack.notifications
      REDIS_URL: redis://redis:6379/0
      SMTP_HOST: ${SMTP_HOST:-mailhog}
      SMTP_PORT: "1025"

  # ── Go Webhook Dispatcher Service ──────────────────────────────────────────
  webhook-dispatcher:
    build:
      context: ./services/webhook-dispatcher
      dockerfile: Dockerfile
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BROKERS: kafka:29092
      KAFKA_TOPICS: cargotrack.shipments.state,cargotrack.tracking.events,cargotrack.alerts.triggered
      REDIS_URL: redis://redis:6379/0
      WEBHOOK_SECRET_KEY: ${WEBHOOK_SECRET_KEY:-change-me-in-production}

  # ── Rust Route Optimization Engine ─────────────────────────────────────────
  route-optimizer:
    build:
      context: ./services/route-optimizer
      dockerfile: Dockerfile
    command: ["echo", "Route optimizer ready — invoke via: docker compose run route-optimizer < request.json"]

  # ── Java Camunda Workflow Engine (BPMN + DMN) ─────────────────────────────
  workflow-engine:
    build:
      context: ./services/workflow-engine
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_NAME: ${DB_NAME:-cargotrack}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD must be set in .env}
      KAFKA_BROKERS: kafka:29092
      WORKFLOW_PORT: "8084"
      CAMUNDA_ADMIN: ${CAMUNDA_ADMIN:-admin}
      CAMUNDA_PASSWORD: ${CAMUNDA_PASSWORD:-admin}
    ports:
      - "8084:8084"

  # ── Java Apache Camel EDI Gateway (EDIFACT + X12 + AS2) ──────────────────
  edi-integration:
    build:
      context: ./services/edi-integration
      dockerfile: Dockerfile
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BROKERS: kafka:29092
      EDI_PORT: "8085"
      EDI_SFTP_HOST: ${EDI_SFTP_HOST:-sftp-partner}
      EDI_SFTP_USER: ${EDI_SFTP_USER:-edi-partner}
      EDI_SFTP_PASSWORD: ${EDI_SFTP_PASSWORD:-change-me}
    ports:
      - "8085:8085"

  # ── Keycloak Identity & Access Management ────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_HEALTH_ENABLED: "true"
      KC_HOSTNAME: auth.cargotrack.localhost
      KC_PROXY_HEADERS: xforwarded
    ports:
      - "8080:8080"
    volumes:
      - ./deploy/keycloak/cargotrack-realm.json:/opt/keycloak/data/import/cargotrack-realm.json:ro
    command: start-dev --import-realm --features=preview
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080; echo -e 'GET /health/ready HTTP/1.1\r\nHost: localhost\r\n\r\n' >&3; grep -q UP <&3"]
      interval: 15s
      timeout: 5s
      retries: 15
      start_period: 60s

  # ── Traefik API Gateway (TLS termination, routing, rate limiting) ──────────
  traefik:
    image: traefik:v3.3
    ports:
      - "80:80"
      - "443:443"
      - "50051:50051"
      - "8082:8080"   # Dashboard (8080 used by Keycloak)
    volumes:
      - ./deploy/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./deploy/traefik/dynamic:/etc/traefik/dynamic:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - letsencrypt:/letsencrypt
    depends_on:
      backend:
        condition: service_started
      frontend:
        condition: service_started
      keycloak:
        condition: service_healthy
      elixir-ws:
        condition: service_started
      go-tracking:
        condition: service_started
      workflow-engine:
        condition: service_started
      edi-integration:
        condition: service_started

  # ══════════════════════════════════════════════════════════════════════════════
  # Phase 5 — Observability Stack
  # ══════════════════════════════════════════════════════════════════════════════

  # ── Prometheus (metrics collection) ────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v3.2
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./deploy/prometheus/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"

  # ── Grafana (dashboards) ───────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.6
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_INSTALL_PLUGINS: ""
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    ports:
      - "3000:3000"
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/grafana/dashboards:/etc/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki

  # ── Jaeger (distributed tracing) ──────────────────────────────────────────
  jaeger:
    image: jaegertracing/all-in-one:1.66
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
      SPAN_STORAGE_TYPE: badger
      BADGER_EPHEMERAL: "false"
      BADGER_DIRECTORY_KEY: /badger/data
      BADGER_DIRECTORY_VALUE: /badger/data
    ports:
      - "16686:16686"   # Query UI
      - "4317:4317"     # OTLP gRPC
      - "4318:4318"     # OTLP HTTP
      - "14250:14250"   # gRPC (legacy collector)
    volumes:
      - jaeger_data:/badger

  # ── Loki (log aggregation) ─────────────────────────────────────────────────
  loki:
    image: grafana/loki:3.3
    ports:
      - "3100:3100"
    volumes:
      - ./deploy/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/loki-config.yml

  # ── Promtail (log collection agent) ────────────────────────────────────────
  promtail:
    image: grafana/promtail:3.3
    volumes:
      - ./deploy/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/promtail-config.yml
    depends_on:
      - loki

  # ── MinIO (S3-compatible object storage) ──────────────────────────────────
  minio:
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-cargotrack}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Console UI
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── PostgreSQL Exporter (Prometheus metrics for Postgres) ─────────────────
  postgres-exporter:
    image: quay.io/prometheuscommunity/postgres-exporter:v0.16
    environment:
      DATA_SOURCE_NAME: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:?DB_PASSWORD}@db:5432/${DB_NAME:-cargotrack}?sslmode=disable
    ports:
      - "9187:9187"
    depends_on:
      db:
        condition: service_healthy

  # ── Redis Exporter (Prometheus metrics for Redis) ─────────────────────────
  redis-exporter:
    image: oliver006/redis_exporter:v1.67
    environment:
      REDIS_ADDR: redis://redis:6379
    ports:
      - "9121:9121"
    depends_on:
      redis:
        condition: service_healthy

  # ── React / Vite frontend ──────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    depends_on:
      - backend
    environment:
      API_PROXY_TARGET: http://backend:8000
    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - ./libs/shared-types:/app/shared
    ports:
      - "5173:5173"

networks:
  default:
    name: cargotrack

volumes:
  postgres_data:
  redis_data:
  kafka_data:
  emqx_data:
  letsencrypt:
  prometheus_data:
  grafana_data:
  loki_data:
  jaeger_data:
  minio_data:
