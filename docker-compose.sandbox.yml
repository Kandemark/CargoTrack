# CargoTrack Sandbox Environment — full stack with synthetic data for local dev
# Usage: docker compose -f docker-compose.sandbox.yml up -d
#        docker compose -f docker-compose.sandbox.yml run backend python manage.py seed_demo
#        docker compose -f docker-compose.sandbox.yml run backend python manage.py generate_training_data
#        docker compose -f docker-compose.sandbox.yml run backend python manage.py train_model

services:
  # ── Core infrastructure ──────────────────────────────────────────────────
  db:
    image: timescale/timescaledb:2.16-pg16
    environment:
      POSTGRES_DB: cargotrack_sandbox
      POSTGRES_USER: cargotrack
      POSTGRES_PASSWORD: sandbox
    ports:
      - "5432:5432"
    volumes:
      - sandbox_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cargotrack -d cargotrack_sandbox"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/confluent-local:7.8.0
    hostname: kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENERS: PLAINTEXT://kafka:29092,CONTROLLER://kafka:29093,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: cargotrack-sandbox
    ports:
      - "9092:9092"

  emqx:
    image: emqx/emqx:5.7-alpine
    ports:
      - "1883:1883"
      - "18083:18083"

  # ── Identity (Keycloak OIDC) ──────────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:26.1
    command:
      - start
      - --import-realm
      - --http-port=8080
      - --proxy=edge
      - --hostname-strict=false
      - --hostname-strict-https=false
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://db:5432/cargotrack_sandbox
      KC_DB_USERNAME: cargotrack
      KC_DB_PASSWORD: sandbox
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./deploy/keycloak/cargotrack-realm.json:/opt/keycloak/data/import/realm.json:ro
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080; echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3; head -1 <&3 | grep -q '200'"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s

  # ── API Gateway (Traefik) ─────────────────────────────────────────────────
  traefik:
    image: traefik:v3.4
    ports:
      - "80:80"
      - "443:443"
      - "50051:50051"
    volumes:
      - ./deploy/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./deploy/traefik/dynamic:/etc/traefik/dynamic:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_certs:/letsencrypt
    depends_on:
      - backend
      - keycloak
    healthcheck:
      test: ["CMD", "traefik", "healthcheck", "--ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend (Django) ─────────────────────────────────────────────────────
  backend:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    environment:
      DEBUG: "true"
      SECRET_KEY: sandbox-insecure-key-do-not-use-in-production
      DB_HOST: db
      DB_USER: cargotrack
      DB_PASSWORD: sandbox
      DB_NAME: cargotrack_sandbox
      REDIS_URL: redis://redis:6379/0
      OIDC_ENABLED: "true"
      OIDC_RP_CLIENT_SECRET: cargotrack-api-secret-change-in-production
      KEYCLOAK_SERVER_URL: http://keycloak:8080
      ALLOWED_HOSTS: "*"
    volumes:
      - ./services/api:/app
    expose:
      - "8000"
    command: >
      sh -c "python manage.py migrate &&
             daphne -b 0.0.0.0 -p 8000 cargotrack.asgi:application"

  # ── Frontend ──────────────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    depends_on:
      - backend
    environment:
      API_PROXY_TARGET: http://backend:8000
    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - ./libs/shared-types:/app/shared
    expose:
      - "5173"

  # ── Observability ─────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v3.2
    expose:
      - "9090"
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"

  grafana:
    image: grafana/grafana:11.6
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
    expose:
      - "3000"
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/grafana/dashboards:/etc/grafana/dashboards:ro

  # ── Centralized Logging (Loki + Promtail) ─────────────────────────────────
  loki:
    image: grafana/loki:3.5
    expose:
      - "3100"
    volumes:
      - ./deploy/loki/loki-config.yml:/etc/loki/config.yml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/config.yml
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3100/ready"]
      interval: 10s
      timeout: 5s
      retries: 5

  promtail:
    image: grafana/promtail:3.5
    depends_on:
      - loki
    volumes:
      - ./deploy/loki/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/config.yml

  # ── Distributed Tracing (Jaeger) ──────────────────────────────────────────
  jaeger:
    image: jaegertracing/all-in-one:1.66
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
      SPAN_STORAGE_TYPE: badger
      BADGER_EPHEMERAL: "true"
      BADGER_DIRECTORY_VALUE: /badger/data
      BADGER_DIRECTORY_KEY: /badger/key
    expose:
      - "6831"
      - "6832"
      - "14250"
      - "14268"
      - "16686"
    volumes:
      - jaeger_data:/badger
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:16686"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  sandbox_pg_data:
  traefik_certs:
  loki_data:
  jaeger_data:
