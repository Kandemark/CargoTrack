server:
  port: 8084

spring:
  application.name: edi-integration

camel:
  springboot:
    main-run-controller: true
    name: edi-integration

edi:
  sftp:
    host: localhost
    port: 22
    user: cargotrack
    username: cargotrack
    password: ""
    pollDelayMs: 60000
  error-dir: /tmp/edi-errors

kafka:
  topic:
    shipments: cargotrack.shipments.state
    tracking: cargotrack.tracking.events
    customs: cargotrack.customs.events
    outbound: cargotrack.edi.outbound
  bootstrap-servers: localhost:9092

logging:
  level:
    com.cargotrack: DEBUG
    org.apache.camel: INFO

management:
  endpoints.web.exposure.include: health,info,camelroutes
  endpoint.health.show-details: always