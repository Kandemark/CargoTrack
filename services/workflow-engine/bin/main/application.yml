server:
  port: ${WORKFLOW_PORT:8084}

spring:
  application.name: workflow-engine
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:cargotrack}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate.ddl-auto: update
  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9092}

camunda.bpm:
  admin-user:
    id: ${CAMUNDA_ADMIN:admin}
    password: ${CAMUNDA_PASSWORD:admin}
  filter.create: All tasks
  history-level: full
  auto-deployment-enabled: true
  database:
    schema-update: true
    type: postgres

kafka:
  bootstrap-servers: ${KAFKA_BROKERS:localhost:9092}
  state-topic: cargotrack.shipments.state
  alerts-topic: cargotrack.alerts.triggered
  notifications-topic: cargotrack.notifications.state

logging:
  level:
    com.cargotrack: DEBUG
    org.camunda.bpm: INFO

management:
  endpoints.web.exposure.include: health,info
  endpoint.health.show-details: always
