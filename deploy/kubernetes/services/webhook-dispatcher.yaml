# Go Webhook Dispatcher — K8s Deployment + Service + HPA
apiVersion: apps/v1
kind: Deployment
metadata:
  name: webhook-dispatcher
  namespace: cargotrack
  labels:
    app: webhook-dispatcher
    app.kubernetes.io/part-of: cargotrack
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: webhook-dispatcher
  template:
    metadata:
      labels:
        app: webhook-dispatcher
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8082"
        prometheus.io/path: "/metrics"
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app: webhook-dispatcher
      containers:
        - name: webhook-dispatcher
          image: ghcr.io/kandemark/cargotrack-webhook-dispatcher:${IMAGE_TAG}
          ports:
            - containerPort: 8082
              name: http
              protocol: TCP
          envFrom:
            - configMapRef:
                name: cargotrack-config
            - secretRef:
                name: cargotrack-secrets
          env:
            - name: KAFKA_BROKERS
              valueFrom:
                secretKeyRef:
                  name: cargotrack-secrets
                  key: KAFKA_BROKERS
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: cargotrack-secrets
                  key: REDIS_URL
            - name: WEBHOOK_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: cargotrack-secrets
                  key: WEBHOOK_SECRET_KEY
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8082
            initialDelaySeconds: 15
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8082
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
---
apiVersion: v1
kind: Service
metadata:
  name: webhook-dispatcher
  namespace: cargotrack
  labels:
    app: webhook-dispatcher
spec:
  type: ClusterIP
  ports:
    - port: 8082
      targetPort: 8082
      name: http
  selector:
    app: webhook-dispatcher
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: webhook-dispatcher-hpa
  namespace: cargotrack
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: webhook-dispatcher
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65
