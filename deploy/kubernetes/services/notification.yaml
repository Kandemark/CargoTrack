# Go Notification Dispatch — K8s Deployment + Service + HPA
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification
  namespace: cargotrack
  labels:
    app: notification
    app.kubernetes.io/part-of: cargotrack
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: notification
  template:
    metadata:
      labels:
        app: notification
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8083"
        prometheus.io/path: "/metrics"
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app: notification
      containers:
        - name: notification
          image: ghcr.io/kandemark/cargotrack-notification:${IMAGE_TAG}
          ports:
            - containerPort: 8083
              name: http
              protocol: TCP
          envFrom:
            - configMapRef:
                name: cargotrack-config
            - secretRef:
                name: cargotrack-secrets
          env:
            - name: KAFKA_BROKERS
              valueFrom:
                secretKeyRef:
                  name: cargotrack-secrets
                  key: KAFKA_BROKERS
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: cargotrack-secrets
                  key: REDIS_URL
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8083
            initialDelaySeconds: 15
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8083
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
---
apiVersion: v1
kind: Service
metadata:
  name: notification
  namespace: cargotrack
  labels:
    app: notification
spec:
  type: ClusterIP
  ports:
    - port: 8083
      targetPort: 8083
      name: http
  selector:
    app: notification
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: notification-hpa
  namespace: cargotrack
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: notification
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65
