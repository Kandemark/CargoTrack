# Java Camunda Workflow Engine — K8s Deployment + Service + HPA
apiVersion: apps/v1
kind: Deployment
metadata:
  name: workflow-engine
  namespace: cargotrack
  labels:
    app: workflow-engine
    app.kubernetes.io/part-of: cargotrack
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: workflow-engine
  template:
    metadata:
      labels:
        app: workflow-engine
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8084"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app: workflow-engine
      containers:
        - name: workflow-engine
          image: ghcr.io/kandemark/cargotrack-workflow-engine:${IMAGE_TAG}
          ports:
            - containerPort: 8084
              name: http
              protocol: TCP
          envFrom:
            - configMapRef:
                name: cargotrack-config
            - secretRef:
                name: cargotrack-secrets
          env:
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: cargotrack-config
                  key: DB_HOST
            - name: KAFKA_BROKERS
              valueFrom:
                secretKeyRef:
                  name: cargotrack-secrets
                  key: KAFKA_BROKERS
          resources:
            requests:
              cpu: 500m
              memory: 768Mi
            limits:
              cpu: 2000m
              memory: 2Gi
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8084
            initialDelaySeconds: 45
            periodSeconds: 20
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8084
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
      terminationGracePeriodSeconds: 45
---
apiVersion: v1
kind: Service
metadata:
  name: workflow-engine
  namespace: cargotrack
  labels:
    app: workflow-engine
spec:
  type: ClusterIP
  ports:
    - port: 8084
      targetPort: 8084
      protocol: TCP
      name: http
  selector:
    app: workflow-engine
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: workflow-engine-hpa
  namespace: cargotrack
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: workflow-engine
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 120
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: workflow-engine-pdb
  namespace: cargotrack
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: workflow-engine
