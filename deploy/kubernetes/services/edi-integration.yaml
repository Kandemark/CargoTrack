# Java Apache Camel EDI Gateway — K8s Deployment + Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: edi-integration
  namespace: cargotrack
  labels:
    app: edi-integration
    app.kubernetes.io/part-of: cargotrack
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: edi-integration
  template:
    metadata:
      labels:
        app: edi-integration
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8085"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app: edi-integration
      containers:
        - name: edi-integration
          image: ghcr.io/kandemark/cargotrack-edi-integration:${IMAGE_TAG}
          ports:
            - containerPort: 8085
              name: http
              protocol: TCP
          envFrom:
            - configMapRef:
                name: cargotrack-config
            - secretRef:
                name: cargotrack-secrets
          env:
            - name: KAFKA_BROKERS
              valueFrom:
                secretKeyRef:
                  name: cargotrack-secrets
                  key: KAFKA_BROKERS
            - name: EDI_SFTP_HOST
              value: sftp-partner.cargotrack.svc.cluster.local
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 1.5Gi
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8085
            initialDelaySeconds: 45
            periodSeconds: 20
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8085
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
      terminationGracePeriodSeconds: 45
---
apiVersion: v1
kind: Service
metadata:
  name: edi-integration
  namespace: cargotrack
  labels:
    app: edi-integration
spec:
  type: ClusterIP
  ports:
    - port: 8085
      targetPort: 8085
      protocol: TCP
      name: http
  selector:
    app: edi-integration
