# CargoTrack coturn TURN/STUN server configuration
# ==================================================
# Used by WebRTC video calls (chats app) to relay media when
# peers are behind symmetric NATs.
#
# In production, set TURN_SECRET and TURN_REALM via environment
# variables and use a real TLS certificate.

listening-port=3478
# TLS listening port (enable in production with real cert)
# tls-listening-port=5349

# STUN only — no credentials needed for binding discovery
# TURN requires long-term credential mechanism
lt-cred-mech

# Realm sent to clients in WWW-Authenticate
realm=${TURN_REALM:-cargotrack.local}

# Shared secret for generating ephemeral TURN credentials
# The backend generates time-limited HMAC-SHA1 credentials from this secret.
use-auth-secret
static-auth-secret=${TURN_SECRET:?TURN_SECRET must be set in .env}

# Fingerprint to help clients identify TURN
fingerprint

# Total quota per allocation (bytes) — 500 MB
total-quota=500

# Maximum allocation time (seconds) — 1 hour
max-allocate-lifetime=3600

# Logging
log-file=stdout
verbose

# Deny UDP on loopback (not needed for Docker)
no-loopback-peers

# Uncomment in production behind a reverse proxy:
# external-ip=${PUBLIC_IP:-auto}/${PRIVATE_IP:-10.0.0.1}
